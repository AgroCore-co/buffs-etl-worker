version: '3.8'

# ========================================
# ETL BUFFS - Docker Compose
# ========================================
# Worker simples sem Redis — jobs in-memory.
# ========================================

services:
  etl-buffs:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: etl-buffs
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      - BUFFS_ETL_ENV=production
      - BUFFS_ETL_PORT=3001
      - BUFFS_ETL_DB_URL=${BUFFS_ETL_DB_URL}
      - BUFFS_ETL_INTERNAL_KEY=${BUFFS_ETL_INTERNAL_KEY}
      - BUFFS_ETL_TEMP_DIR=/app/temp/uploads
      - BUFFS_ETL_ASYNC_THRESHOLD=1000
    volumes:
      - etl-uploads:/app/temp/uploads
    networks:
      - buffs-network

volumes:
  etl-uploads:

networks:
  buffs-network:
    name: buffs-network
    external: true
